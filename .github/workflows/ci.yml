name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code-changed: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.code-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository-2.0-dev gcc libcairo2-dev pkg-config python3-dev gir1.2-gtk-3.0 gir1.2-webkit2-4.1

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run tests
        run: uv run pytest --ignore=tests/test_ui.py

      - name: Run UI tests
        run: uv run pytest tests/test_ui.py

  ci-status:
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [[ "${{ needs.test.result }}" != "success" && "${{ needs.test.result }}" != "skipped" ]]; then
            echo "test did not complete successfully (status: ${{ needs.test.result }})"
            exit 1
          fi
          echo "CI passed"

  code-review:
    needs: ci-status
    if: >
      success() && github.event.pull_request.draft == false &&
      contains('OWNER,COLLABORATOR,MEMBER', github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          track_progress: true
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a code reviewer. Review this pull request for bugs and code quality issues.
            Do NOT review for security — a separate security review handles that.

            This is a desktop image review/annotation tool (Python + pywebview + Fabric.js canvas).
            Calibrate accordingly.

            The PR branch is already checked out in the current working directory.

            ## Review process

            1. Read the PR diff and changed files.
            2. Check any CLAUDE.md files in the repo root and in directories touched by the PR.
            3. For each potential issue you find, score your confidence (0-100):
               - 0: False positive that doesn't stand up to scrutiny, or a pre-existing issue.
               - 25: Might be real, but you couldn't verify it.
               - 50: Real but a nitpick, or unlikely to matter in practice.
               - 75: Very likely real and will be hit in practice. Important to fix.
               - 100: Definitely real, confirmed by evidence in the code.
            4. Discard any issue scoring below 80.
            5. Post at most 5 inline comments. If fewer than 5 issues qualify, that's fine.
            6. If zero issues qualify, post a single PR comment:
               "Code review: no issues found."

            ## What NOT to flag

            - Pedantic nitpicks a senior engineer wouldn't call out
            - Things a linter, typechecker, or test suite would catch
            - General code quality suggestions (test coverage, docs, style) unless CLAUDE.md explicitly requires them
            - Pre-existing issues on lines not modified in this PR
            - Theoretical problems you immediately want to caveat with "not a bug" or "nice-to-have"
            - Intentional changes in functionality that align with the PR's purpose

            ## Comment format

            Keep each comment to 1-3 sentences: what the problem is and how to fix it.
            Provide a code suggestion when possible. Do not explain alternatives, caveats,
            or edge cases unless they are critical to understanding the fix.

            Use `mcp__github_inline_comment__create_inline_comment` for inline comments.
            Use `gh pr comment` only if you need a top-level summary.
            Only post GitHub comments — don't submit review text as messages.

  security-review:
    needs: ci-status
    if: >
      success() && github.event.pull_request.draft == false &&
      contains('OWNER,COLLABORATOR,MEMBER', github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Security Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          track_progress: true
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a security reviewer. Analyze this PR exclusively for security issues.
            Do NOT review code style, performance, or general best practices — only security.

            This is a desktop image review/annotation tool. It runs a local HTTP server
            (127.0.0.1) to serve a canvas-based annotation UI and processes base64-encoded
            image data from the browser. It handles file paths for image I/O. There is no
            authentication, no external network calls, and no user accounts — it's a
            single-user local tool.

            Focus on:
            - Path traversal when handling file paths from CLI arguments
            - Command injection if spawning subprocesses
            - Unsafe handling of base64 image data (e.g., zip bombs, oversized payloads)
            - Binding to 0.0.0.0 instead of 127.0.0.1
            - XSS in the served HTML (dynamic content injection)

            The PR branch is already checked out in the current working directory.

            ## Review process

            1. Read the PR diff and changed files.
            2. For each potential finding, score your confidence (0-100):
               - 0: Theoretical risk requiring an unlikely attack scenario.
               - 25: Possible issue, but you couldn't construct a concrete attack scenario.
               - 50: Real issue but low impact or requires unlikely preconditions.
               - 75: Real issue with a concrete attack scenario that could be hit in practice.
               - 100: Confirmed vulnerability with clear exploit path.
            3. Discard any finding scoring below 75.
            4. Post at most 3 inline comments. Prioritize by severity.
            5. If zero findings qualify, post a single PR comment:
               "Security review: no issues found in this PR."

            ## What NOT to flag

            - Theoretical attacks requiring compromise of the user's machine
            - Missing authentication on localhost-only server (by design)
            - Issues on lines not modified in this PR

            ## Comment format

            For each finding: state the vulnerability, the attack scenario in 1 sentence,
            and suggest a fix with a code suggestion. Keep it concise.

            Use `mcp__github_inline_comment__create_inline_comment` for inline comments.
            Use `gh pr comment` only if you need a top-level summary.
            Only post GitHub comments — don't submit review text as messages.
